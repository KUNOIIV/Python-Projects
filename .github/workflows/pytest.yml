name: Python Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install project + deps
      run: pip install -e .  # Uses pyproject.toml (pytest + others)

    - name: Run tests
      run: pytest -v  # Auto-uses pyproject.toml config (testpaths=Tests/, pythonpath=Tests/)

    - name: Upload test results (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: .pytest_cache/